name: biblia

services:
  nginx:
    image: nginx:alpine
    container_name: biblia_nginx
    ports:
      - "8084:80"
    volumes:
      - ../www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - biblia_network

  php:
    build:
      context: ./php
    container_name: biblia_php
    volumes:
      - ../www:/var/www/html
    networks:
      - biblia_network

  db:
    image: mariadb:10.11
    container_name: biblia_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblia
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../biblia_13V/biblia_13V.sql:/docker-entrypoint-initdb.d/biblia_13V.sql
    networks:
      - biblia_network
    command: --innodb-ft-min-token-size=2 # Otimiza Full-Text Search para palavras curtas

  redis:
    image: redis:alpine
    container_name: biblia_redis
    ports:
      - "6379:6379"
    networks:
      - biblia_network
    command: redis-server --appendonly yes

networks:
  biblia_network:
    driver: bridge

volumes:
  db_data:
